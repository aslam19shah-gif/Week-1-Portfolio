<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Aslam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="container navbar">
        <h1 class="logo">Aslam</h1>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <button id="darkToggle" class="dark-btn">🌙</button>
    </nav>
</header>

<main class="container">
  <section>
    <h2>Contact Me</h2>

    <form class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" required minlength="3">

      <label for="email">Email</label>
      <input type="email" id="email" required>

      <label for="message">Message</label>
      <textarea id="message" required minlength="10"></textarea>

      <button type="submit">Send Message</button>
    </form>

  </section>
</main>

<footer>
  <p>© 2026 Aslam. All rights reserved.</p>
</footer>
  <script src="script.js"></script>

</body>
</html>
